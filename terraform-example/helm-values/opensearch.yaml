clusterName: "opensearch-cluster"
nodeGroup: "master"
replicas: 3
singleNode: false

extraEnvs:
  - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
    value: ${initial_admin_password}

serviceMonitor:
  enabled: false

resources:
  requests:
    cpu: "100m"
    memory: "512M"
  limits:
    cpu: "1000m"
    memory: "1Gi"

persistence:
  enabled: true
  size: 20Gi
  storageClass: "gp3"

config:
  opensearch.yml: |
    # plugins:
    #   security:
    #     ssl:
    #       transport:
    #         pemcert_filepath: esnode.pem
    #         pemkey_filepath: esnode-key.pem
    #         pemtrustedcas_filepath: root-ca.pem
    #         enforce_hostname_verification: false
    #       http:
    #         enabled: true
    #         pemcert_filepath: esnode.pem
    #         pemkey_filepath: esnode-key.pem
    #         pemtrustedcas_filepath: root-ca.pem
    #     allow_unsafe_democertificates: true
    #     allow_default_init_securityindex: true
    #     restapi:
    #       roles_enabled: ["all_access", "security_rest_api_access"]
  log4j2.properties: |
    # 기본값 수정 X, 덮어쓰기 방식이므로 지우면 기본값이 사라짐
    status = error
    appender.console.type = Console
    appender.console.name = console
    appender.console.layout.type = PatternLayout
    appender.console.layout.pattern = [%d{ISO8601}][%-5p][%-25c{1.}] [%node_name]%marker %m%n
    rootLogger.level = info
    rootLogger.appenderRef.console.ref = console
    
    # BackendRegistry의 WARN 로그를 ERROR로 상향 조정, 즉 백엔드 유저의 인증 실패로그를 WARN에서 ERROR로 상향 조정
    # "No 'Authorization' header, send 401" 경고 메시지 숨김
    logger.BackendRegistry.name = org.opensearch.security.auth.BackendRegistry
    logger.BackendRegistry.level = error
    logger.BackendRegistry.appenderRef.console.ref = console

# 마스터 노드 자동 검색 활성화
masterService: "opensearch-cluster-master"
service:
  type: ClusterIP
  port: 9200

podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Fargate 회피 + HA를 위한 Anti-Affinity
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: eks.amazonaws.com/compute-type
              operator: DoesNotExist
  # 각 파드를 다른 노드에 분산 배치 (HA)
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - opensearch
          topologyKey: kubernetes.io/hostname
# 여러 AZ에 파드 분산 (EBS 볼륨 AZ 고정 문제 해결)
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: opensearch