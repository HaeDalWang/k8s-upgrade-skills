# workload 네임스페이스 파드 로그만 수집 → OpenSearch 전송 (인덱스: workload-app-%Y.%m)
# K8s 파일 네이밍 컨벤션으로 I/O 수준에서 네임스페이스 필터링 (grep 불필요)
# 참고: https://docs.fluentbit.io/manual/pipeline/outputs/opensearch
priorityClassName: system-node-critical

config:
  service: |
    [SERVICE]
      Daemon                    Off
      Flush                     1
      Log_Level                 info
      Parsers_File              /fluent-bit/etc/parsers.conf
      Parsers_File              /fluent-bit/etc/conf/custom_parsers.conf
      HTTP_Server               On
      HTTP_Listen               0.0.0.0
      HTTP_Port                 2020
      Health_Check              On

  inputs: |
    [INPUT]
      Name              tail
      Path              /var/log/containers/*_${app_namespace}_*.log
      Tag               app.*
      multiline.parser  cri
      Mem_Buf_Limit     50MB
      Skip_Long_Lines   On
      Refresh_Interval  10

  filters: |
    [FILTER]
      Name                multiline
      Match               app.*
      multiline.parser    python,go,java
      multiline.key_content log
      buffer              On

    [FILTER]
      Name                kubernetes
      Match               app.*
      Kube_URL            https://kubernetes.default.svc:443
      Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
      Kube_Tag_Prefix     app.var.log.containers.
      Merge_Log           On
      Merge_Log_Key       log_processed
      Keep_Log            Off
      K8S-Logging.Parser  On
      K8S-Logging.Exclude Off
      Use_Kubelet         Off
      Kubelet_Port        10250

    [FILTER]
        Name                nest
        Match               app.*
        Operation           lift
        Nested_under        kubernetes
        Add_prefix          kubernetes.
    
    [FILTER]
        Name                modify
        Match               app.*
        Remove              time
        Remove              _p
        Remove              kubernetes.container_hash
        Remove              kubernetes.container_image
        Remove              kubernetes.container_name
        Remove              kubernetes.docker_id
        Remove              kubernetes.host
        Remove              kubernetes.namespace_name
        Remove              kubernetes.pod_id
        Remove              kubernetes.pod_name
        Remove              kubernetes.annotations

    [FILTER]
        Name                nest
        Match               app.*
        Operation           lift
        Nested_under        kubernetes.labels
        Add_prefix          kubernetes_labels.

    [FILTER]
        Name                modify
        Match               app.*
        Remove              kubernetes_labels.app.kubernetes.io/instance
        Remove              kubernetes_labels.app.kubernetes.io/managed-by
        Remove              kubernetes_labels.app.kubernetes.io/name
        Remove              kubernetes_labels.app.kubernetes.io/version
        Remove              kubernetes_labels.helm.sh/chart
        Remove              kubernetes_labels.pod-template-hash

    [FILTER]
        Name                nest
        Match               app.*
        Operation           nest
        Wildcard            kubernetes_labels.*
        Nest_under          kubernetes.labels
        Remove_prefix       kubernetes_labels.

    [FILTER]
        Name                nest
        Match               app.*
        Operation           nest
        Wildcard            kubernetes.*
        Nested_under        kubernetes
        Remove_prefix       kubernetes.

  outputs: |
    [OUTPUT]
      Name                opensearch
      Match               app.*
      Host                ${es_host}
      Port                ${es_port}
      HTTP_User           ${es_user}
      HTTP_Passwd         ${es_password}
      Suppress_Type_Name  On
      Logstash_Format     On
      Logstash_Prefix     ${index_prefix}
      Logstash_DateFormat %Y.%m
      Replace_Dots        On
      Retry_Limit         False
      tls                 ${es_tls}
      # demo 자체서명 인증서 사용 시 Off. 프로덕션은 CA 검증 권장
      tls.verify          Off
      Trace_Error         On
