apiVersion: pgv2.percona.com/v2
kind: PerconaPGCluster
metadata:
  name: cluster1
  namespace: postgresql
spec:
  crVersion: 2.5.1
  image: percona/percona-postgresql-operator:2.5.1-ppg16.8-postgres
  imagePullPolicy: Always
  postgresVersion: 16

  # DB 전용 NodePool 스케줄 (karpenter.sh/nodepool: database)

  instances:
  - name: instance1
    replicas: 1
    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: kubernetes.io/arch
              operator: In
              values:
              - amd64
            - key: eks.amazonaws.com/compute-type
              operator: NotIn
              values:
              - fargate
            - key: karpenter.sh/nodepool
              operator: In
              values:
              - database
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 1
          podAffinityTerm:
            labelSelector:
              matchLabels:
                postgres-operator.crunchydata.com/data: postgres
            topologyKey: kubernetes.io/hostname
    dataVolumeClaimSpec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 20Gi

  proxy:
    pgBouncer:
      replicas: 1
      image: percona/percona-postgresql-operator:2.5.1-ppg16.8-pgbouncer1.24.0
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values:
                - amd64
              - key: eks.amazonaws.com/compute-type
                operator: NotIn
                values:
                - fargate
              - key: karpenter.sh/nodepool
                operator: In
                values:
                - database
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 1
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  postgres-operator.crunchydata.com/role: pgbouncer
              topologyKey: kubernetes.io/hostname

  backups:
    pgbackrest:
      image: percona/percona-postgresql-operator:2.5.1-ppg16.8-pgbackrest2.54.2
      repoHost:
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: kubernetes.io/arch
                  operator: In
                  values:
                  - amd64
                - key: eks.amazonaws.com/compute-type
                  operator: NotIn
                  values:
                  - fargate
                - key: karpenter.sh/nodepool
                  operator: In
                  values:
                  - database
  #         podAntiAffinity:
  #           preferredDuringSchedulingIgnoredDuringExecution:
  #           - weight: 1
  #             podAffinityTerm:
  #               labelSelector:
  #                 matchLabels:
  #                   postgres-operator.crunchydata.com/data: pgbackrest
  #               topologyKey: kubernetes.io/hostname
      manual:
        repoName: repo1
  #       options:
  #        - --type=full
      repos:
      - name: repo1
        schedules:
          full: "0 0 * * 6"
        volume:
          volumeClaimSpec:
            accessModes:
            - ReadWriteOnce
            resources:
              requests:
                storage: 1Gi

  pmm:
    enabled: false
    image: percona/pmm-client:2.44.0
    secret: cluster1-pmm-secret
    serverHost: monitoring-service