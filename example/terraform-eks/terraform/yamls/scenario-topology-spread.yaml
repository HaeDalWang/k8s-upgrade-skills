# [시나리오] WLS-006: DoNotSchedule TSC — 노드 부족 시 Pending 고착
#
# 문제: whenUnsatisfiable=DoNotSchedule 설정 시
#       drain으로 노드 수가 줄어들면 스케줄러가 토폴로지 제약을 만족할 수 없어
#       Pod가 Pending 상태로 고착됨.
#       특히 replicas > 가용 노드 수일 때 발생.
#
# 재현: 노드 2개 환경에서 drain 1개 → 남은 노드 1개로는
#       maxSkew=1 + 3 replicas 조건 불만족 → 일부 Pod Pending
#
# 조치: whenUnsatisfiable=ScheduleAnyway로 변경하거나
#       업그레이드 전 surge 노드 추가
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: topology-strict-app
  namespace: upgrade-risk-demo
  labels:
    scenario: topology-spread
spec:
  replicas: 3
  selector:
    matchLabels:
      app: topology-strict-app
  template:
    metadata:
      labels:
        app: topology-strict-app
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule   # ← 위험: 노드 부족 시 Pending 고착
          labelSelector:
            matchLabels:
              app: topology-strict-app
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule   # ← AZ 단위도 동일 위험
          labelSelector:
            matchLabels:
              app: topology-strict-app
      containers:
        - name: app
          image: nginx:stable-alpine
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
