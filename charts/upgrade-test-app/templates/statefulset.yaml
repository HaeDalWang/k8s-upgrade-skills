{{- if .Values.statefulset.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "app.fullname" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "app.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "app.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "app.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.scheduling.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.scheduling.affinity .Values.scheduling.nodeAffinity .Values.scheduling.podAffinity .Values.scheduling.podAntiAffinity }}
      affinity:
        {{- if .Values.scheduling.nodeAffinity }}
        nodeAffinity:
          {{- toYaml .Values.scheduling.nodeAffinity | nindent 10 }}
        {{- end }}
        {{- if .Values.scheduling.podAffinity }}
        podAffinity:
          {{- toYaml .Values.scheduling.podAffinity | nindent 10 }}
        {{- end }}
        {{- if .Values.scheduling.podAntiAffinity }}
        podAntiAffinity:
          {{- toYaml .Values.scheduling.podAntiAffinity | nindent 10 }}
        {{- end }}
        {{- if and (not .Values.scheduling.nodeAffinity) (not .Values.scheduling.podAffinity) (not .Values.scheduling.podAntiAffinity) .Values.scheduling.affinity }}
        {{- toYaml .Values.scheduling.affinity | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.scheduling.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.scheduling.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- range . }}
        - maxSkew: {{ .maxSkew }}
          topologyKey: {{ .topologyKey }}
          whenUnsatisfiable: {{ .whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "app.name" $ }}
              app.kubernetes.io/instance: {{ $.Release.Name }}
          {{- if .minDomains }}
          minDomains: {{ .minDomains }}
          {{- end }}
        {{- end }}
      {{- end }}
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
{{- end }}
