# -----------------------------------------------------------------------------
# 미션: wrong-creds
# 증상: DB 연결 실패 → CrashLoopBackOff
# 목표: kubectl logs, kubectl describe pod 로 원인 파악 후 Secret 수정
#
# 적용: helm upgrade ... -f values.yaml -f values_mongo_crud.yaml -f values_mission_wrong_creds.yaml
# -----------------------------------------------------------------------------

env:
  - name: MISSION
    value: "wrong-creds"
  # 나머지 env는 base values 파일에서 상속됨
  # MONGO_URI / PG_DSN 은 그대로 유지 → 앱 내부에서 잘못된 URI로 오버라이드
