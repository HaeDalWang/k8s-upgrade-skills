# -----------------------------------------------------------------------------
# mongo-crud: Python FastAPI + MongoDB CRUD + Valkey pub/sub
# 기본 사용: helm upgrade --install mongo-crud ./upgrade-test-app \
#   -f values.yaml -f values_mongo_crud.yaml -n workload
# -----------------------------------------------------------------------------

image:
  repository: svvwac98/msa-demo-apps
  tag: "mongo-crud-latest"
  pullPolicy: Always

replicaCount: 2
containerPort: 8080

service:
  type: ClusterIP
  port: 80

command: ["python", "main.py"]

env:
  - name: MONGO_URI
    valueFrom:
      secretKeyRef:
        name: mongo-crud-secret
        key: MONGO_URI
  - name: VALKEY_HOST
    value: "valkey-production.middleware.svc.cluster.local"
  - name: VALKEY_PORT
    value: "6379"
  - name: VALKEY_PASSWORD
    value: "Test1234!"  # middleware.tf auth.aclUsers.default.password와 동일
  - name: WORKER_INTERVAL
    value: "5"
  - name: MISSION
    value: ""

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

scheduling:
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
