# -----------------------------------------------------------------------------
# PDB 시나리오: PodDisruptionBudget + AZ 분산 (topologySpread) + Pod 안티어피니티
# drain/업그레이드 시 disruptionsAllowed, maxSkew 동작 트러블슈팅용
# -----------------------------------------------------------------------------

replicaCount: 3

pdb:
  enabled: true
  minAvailable: 2
  # maxUnavailable: 0   # minAvailable 과 둘 중 하나만 사용

# AZ 기준 분산 (maxSkew: 1 → 존당 편차 최대 1). labelSelector는 템플릿에서 자동 주입.
scheduling:
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      minDomains: 2
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway

  # 같은 노드에 2개 이상 안 모이게 (preferred). 재사용 시 chart name에 맞게 matchLabels만 동일하게.
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: upgrade-test-app
          topologyKey: kubernetes.io/hostname
