# -----------------------------------------------------------------------------
# 기본값. 차트 재사용 시 Chart.yaml의 name 변경 또는 nameOverride 로 앱 이름 지정.
# -----------------------------------------------------------------------------

nameOverride: ""
replicaCount: 2

image:
  repository: nginx
  tag: "1.27"
  pullPolicy: IfNotPresent

# 컨테이너 실행 명령어 오버라이드
command: []
  # - python
  # - main.py
args: []
  # - --host=0.0.0.0

# 컨테이너 포트 (service.targetPort 자동 연동)
containerPort: 80

# 환경변수
env: []
  # - name: MONGO_URI
  #   value: "mongodb://..."
  # - name: MISSION
  #   value: "wrong-creds"

# Secret/ConfigMap 일괄 주입
envFrom: []
  # - secretRef:
  #     name: db-secret
  # - configMapRef:
  #     name: app-config

# Liveness Probe
livenessProbe: {}
  # httpGet:
  #   path: /health
  #   port: 8080
  # initialDelaySeconds: 10
  # periodSeconds: 10

# Readiness Probe
readinessProbe: {}
  # httpGet:
  #   path: /health
  #   port: 8080
  # initialDelaySeconds: 5
  # periodSeconds: 5
  # failureThreshold: 3

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

service:
  type: ClusterIP
  port: 80
  # targetPort는 containerPort를 자동으로 사용. 직접 지정하려면 아래 주석 해제.
  # targetPort: 8080

# -----------------------------------------------------------------------------
# 스케줄링 (nodeSelector, affinity, topologySpread, tolerations)
# -----------------------------------------------------------------------------
scheduling:
  nodeSelector: {}
    # workload: system
    # topology.kubernetes.io/zone: ap-northeast-2a

  # 통째로 넣을 때 (세분화 필드 없이)
  affinity: {}

  # 세분화: nodeAffinity (required / preferred)
  nodeAffinity: {}
    # requiredDuringSchedulingIgnoredDuringExecution:
    #   nodeSelectorTerms:
    #     - matchExpressions:
    #         - key: node.kubernetes.io/instance-type
    #           operator: In
    #           values: [t3a.medium, t3a.large]
    # preferredDuringSchedulingIgnoredDuringExecution:
    #   - weight: 1
    #     preference:
    #       matchExpressions:
    #         - key: topology.kubernetes.io/zone
    #           operator: In
    #           values: [ap-northeast-2a, ap-northeast-2b]

  # podAffinity: 동일 존/노드에 모으기
  podAffinity: {}
    # preferredDuringSchedulingIgnoredDuringExecution:
    #   - weight: 100
    #     podAffinityTerm:
    #       labelSelector:
    #         matchLabels:
    #           app.kubernetes.io/name: my-cache
    #       topologyKey: topology.kubernetes.io/zone

  # podAntiAffinity: 파드 분산 (같은 노드/존 피하기)
  podAntiAffinity: {}
    # preferredDuringSchedulingIgnoredDuringExecution:
    #   - weight: 100
    #     podAffinityTerm:
    #       labelSelector:
    #         matchLabels:
    #           app.kubernetes.io/name: upgrade-test-app
    #       topologyKey: kubernetes.io/hostname
    # requiredDuringSchedulingIgnoredDuringExecution:
    #   - labelSelector:
    #       matchLabels:
    #         app.kubernetes.io/name: upgrade-test-app
    #     topologyKey: topology.kubernetes.io/zone

  tolerations: []
    # - key: workload
    #   operator: Equal
    #   value: system
    #   effect: NoSchedule

  # topologySpreadConstraints: AZ/노드 분산 (maxSkew, whenUnsatisfiable, minDomains)
  topologySpreadConstraints: []
    # - maxSkew: 1
    #   topologyKey: topology.kubernetes.io/zone
    #   whenUnsatisfiable: DoNotSchedule   # DoNotSchedule | ScheduleAnyway
    #   labelSelector: { matchLabels: { app.kubernetes.io/name: <chart-name> } }
    #   minDomains: 2
    # - maxSkew: 1
    #   topologyKey: kubernetes.io/hostname
    #   whenUnsatisfiable: ScheduleAnyway
    #   labelSelector: { matchLabels: { app.kubernetes.io/name: <chart-name> } }

# -----------------------------------------------------------------------------
# PDB (values_pdb.yaml 에서 활성화)
# -----------------------------------------------------------------------------
pdb:
  enabled: false
  # minAvailable: 1
  # maxUnavailable: 0

# -----------------------------------------------------------------------------
# PV/PVC, StatefulSet (values_pv.yaml 에서 활성화)
# -----------------------------------------------------------------------------
persistence:
  enabled: false
  mountPath: /data
  size: 2Gi
  storageClass: gp3

statefulset:
  enabled: false
