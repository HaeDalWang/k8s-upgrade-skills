# -----------------------------------------------------------------------------
# 미션: dns-fail (event-hub 전용)
# 증상: 잘못된 서비스명으로 연결 실패 → /trigger/* 502 에러
# 목표: kubectl exec event-hub -- nslookup mongo-crud-INVALID.workload.svc.cluster.local
#       kubectl get svc -n workload 로 실제 서비스명 확인 후 env 수정
#
# 적용: helm upgrade ... -f values.yaml -f values_event_hub.yaml -f values_mission_dns_fail.yaml
# -----------------------------------------------------------------------------

env:
  - name: MISSION
    value: "dns-fail"
  - name: VALKEY_HOST
    value: "valkey-master.middleware.svc.cluster.local"
  - name: VALKEY_PORT
    value: "6379"
  # MONGO_CRUD_URL / PG_CRUD_URL 은 MISSION=dns-fail 시 앱 내부에서 잘못된 주소로 오버라이드
