# apps/ 폴더 변경 시 해당 앱만 빌드하여 Docker Hub에 푸시
# Secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
# Variables: DOCKERHUB_REPO (선택, 기본값: msa-demo-apps)

name: Build and Push Docker Images

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'apps/**'

env:
  REGISTRY: docker.io

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      mongo-crud: ${{ steps.filter.outputs.mongo-crud }}
      pg-crud: ${{ steps.filter.outputs.pg-crud }}
      event-hub: ${{ steps.filter.outputs.event-hub }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            mongo-crud:
              - 'apps/mongo-crud/**'
            pg-crud:
              - 'apps/pg-crud/**'
            event-hub:
              - 'apps/event-hub/**'

  build-push:
    needs: detect-changes
    runs-on: ubuntu-latest
    if: |
      needs.detect-changes.outputs.mongo-crud == 'true' ||
      needs.detect-changes.outputs.pg-crud == 'true' ||
      needs.detect-changes.outputs.event-hub == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: mongo-crud
            context: apps/mongo-crud
          - app: pg-crud
            context: apps/pg-crud
          - app: event-hub
            context: apps/event-hub
    steps:
      - uses: actions/checkout@v4

      - name: Skip if unchanged
        id: skip
        run: |
          if [ "${{ needs.detect-changes.outputs[matrix.app] }}" = "true" ]; then
            echo "build=true" >> $GITHUB_OUTPUT
          else
            echo "build=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: steps.skip.outputs.build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.skip.outputs.build == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        if: steps.skip.outputs.build == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.DOCKERHUB_REPO || 'msa-demo-apps' }}
          tags: |
            type=raw,value=${{ matrix.app }},enable=${{ github.event_name == 'push' }}
            type=raw,value=${{ matrix.app }}-${{ github.sha }},enable=${{ github.event_name == 'push' }}
            type=raw,value=${{ matrix.app }}-latest,enable=${{ github.event_name == 'push' }}

      - name: Build and push
        if: steps.skip.outputs.build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64  # EKS 노드 아키텍처
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
